name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing version tag to publish (for example, v1.2.0)
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  verify-release-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Resolve release metadata
        id: release_meta
        run: |
          TAG_NAME="${RELEASE_TAG}"
          RELEASE_VERSION="${TAG_NAME#v}"

          if [[ -z "$TAG_NAME" || "$TAG_NAME" == "$RELEASE_VERSION" ]]; then
            echo "Expected a v-prefixed tag like v1.2.0, got '$TAG_NAME'." >&2
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
            echo "Tag '$TAG_NAME' does not map to a valid semantic version." >&2
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release metadata matches repository versions
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./extension/manifest.json').version")

          if [[ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

          if [[ "$MANIFEST_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "extension/manifest.json version $MANIFEST_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

          PYPROJECT_VERSION=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          if [[ "$PYPROJECT_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "pyproject.toml version $PYPROJECT_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

      - name: Verify changelog section exists
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          awk -v version="$RELEASE_VERSION" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > changelog-section.md

          if [[ ! -s changelog-section.md ]]; then
            echo "CHANGELOG.md is missing a section for version $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Summarize manual release inputs
        run: |
          {
            echo "## Manual Release"
            echo ""
            echo "- tag_name: \`${{ steps.release_meta.outputs.tag_name }}\`"
            echo "- release_version: \`${{ steps.release_meta.outputs.release_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  test-js:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    needs: verify-release-version
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-version.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: verify-release-version
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-version.outputs.tag_name }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.7'
          python-version: '3.11'
          enable-cache: true
          cache-python: true
      - run: uv sync --frozen --dev --no-install-project
      - run: uv run --no-sync pytest tests/server/ -v

  test-e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: verify-release-version
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-version.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run -a npm run test:e2e

  publish-release-assets:
    name: Build And Upload Release Assets
    runs-on: ubuntu-latest
    needs:
      - verify-release-version
      - test-js
      - test-python
      - test-e2e
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-release-version.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.7'
          python-version: '3.11'
          enable-cache: true
          cache-python: true

      - name: Install build dependencies
        run: |
          npm ci
          uv sync --frozen --no-dev --no-install-project

      - name: Build extension ZIP
        run: bash scripts/build_crx.sh dist/veil-extension.zip

      - name: Build backend release bundle
        env:
          VEIL_RELEASE_TAG: ${{ needs.verify-release-version.outputs.tag_name }}
          VEIL_RELEASE_HTML_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.verify-release-version.outputs.tag_name }}
        run: |
          export VEIL_RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          uv run --no-sync python scripts/build_backend_bundle.py

      - name: Build model bundle (fp16 ONNX from HuggingFace)
        run: uv run --no-sync python scripts/build_model_bundle.py

      - name: Rename extension ZIP with version
        run: mv dist/veil-extension.zip "dist/veil-extension-${{ needs.verify-release-version.outputs.release_version }}.zip"

      - name: Compose release notes
        env:
          TAG_NAME: ${{ needs.verify-release-version.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.verify-release-version.outputs.release_version }}
        run: |
          awk -v version="$RELEASE_VERSION" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > changelog-section.md

          cat > release-notes.md <<EOF
          ## Veil Extension ${TAG_NAME}

          ### Installation
          1. Download **veil-extension-${RELEASE_VERSION}.zip** below
          2. Extract the zip file
          3. Open Chrome -> `chrome://extensions` -> Enable **Developer mode**
          4. Click **Load unpacked** and select the extracted folder

          ### Local Server Install / Update
          Linux/macOS:
          `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash -s -- --extension-id <EXTENSION_ID>`

          Windows:
          `powershell -NoProfile -ExecutionPolicy Bypass -Command "irm 'https://github.com/${{ github.repository }}/releases/latest/download/install.ps1' | iex; Install-Veil -ExtensionId '<EXTENSION_ID>'"`

          ### Local Server Uninstall
          Linux/macOS:
          `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/uninstall.sh | bash`

          Windows:
          `powershell -NoProfile -ExecutionPolicy Bypass -Command "irm 'https://github.com/${{ github.repository }}/releases/latest/download/uninstall.ps1' | iex; Uninstall-Veil"`

          ### Chrome Web Store
          Submit the zip to the [Chrome Web Store Developer Console](https://chrome.google.com/webstore/devconsole).

          ### Changelog
          EOF

          cat changelog-section.md >> release-notes.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-release-version.outputs.tag_name }}
          name: "Veil ${{ needs.verify-release-version.outputs.tag_name }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.verify-release-version.outputs.tag_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/veil-extension-${{ needs.verify-release-version.outputs.release_version }}.zip
            dist/install.sh
            dist/install.ps1
            dist/uninstall.sh
            dist/uninstall.ps1
            dist/veil-backend-unix.tar.gz
            dist/veil-backend-windows.zip
            dist/veil-model-fp16.tar.gz
