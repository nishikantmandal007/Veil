name: Release

on:
  push:
    tags:
      - 'v*'   # Trigger on version tags: v1.0.0, v1.2.3, etc.

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  build-and-release:
    name: Build Extension Package & Create Release
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so CHANGELOG.md is present

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Build extension ZIP
        run: bash scripts/build_crx.sh dist/veil-extension.zip

      - name: Build backend release bundle
        run: python3 scripts/build_backend_bundle.py

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./extension/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename ZIP with version
        run: |
          mv dist/veil-extension.zip "dist/veil-extension-${{ steps.version.outputs.version }}.zip"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Pull out the block between this version's header and the next
          NOTES=$(awk "/^## \\[$VERSION\\]/,/^## \\[/{ if (/^## \\[/ && !/^## \\[$VERSION\\]/) exit; print }" CHANGELOG.md | tail -n +2)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Veil ${{ steps.version.outputs.tag }}"
          body: |
            ## Veil Extension ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download **veil-extension-${{ steps.version.outputs.version }}.zip** below
            2. Extract the zip file
            3. Open Chrome → `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** and select the extracted folder

            ### Local Server Install / Update
            Linux/macOS:
            `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash -s -- --extension-id <EXTENSION_ID>`

            Windows:
            `powershell -NoProfile -ExecutionPolicy Bypass -Command "irm 'https://github.com/${{ github.repository }}/releases/latest/download/install.ps1' | iex; Install-Veil -ExtensionId '<EXTENSION_ID>'"`

            ### Local Server Uninstall
            Linux/macOS:
            `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/uninstall.sh | bash`

            Windows:
            `powershell -NoProfile -ExecutionPolicy Bypass -Command "irm 'https://github.com/${{ github.repository }}/releases/latest/download/uninstall.ps1' | iex; Uninstall-Veil"`

            ### Chrome Web Store
            Submit the zip to the [Chrome Web Store Developer Console](https://chrome.google.com/webstore/devconsole).

            ---

            ${{ steps.changelog.outputs.notes }}
          files: |
            dist/veil-extension-${{ steps.version.outputs.version }}.zip
            dist/install.sh
            dist/install.ps1
            dist/uninstall.sh
            dist/uninstall.ps1
            dist/veil-backend-unix.tar.gz
            dist/veil-backend-windows.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

  # Optional: run unit tests before packaging
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run JS unit tests
        run: node tests/js/test_background_utils.js
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python test deps
        run: pip install pytest
      - name: Install Python runtime deps
        run: pip install -r requirements.txt
      - name: Run Python unit tests
        run: pytest tests/server/ -v
