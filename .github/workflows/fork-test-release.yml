name: Fork Test Release

on:
  push:
    branches:
      - chore/maya-remote-sync
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-fork-test-release:
    name: Build And Publish Fork Test Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run JS unit tests
        run: npm run test:unit

      - name: Run Python unit tests
        run: pytest tests/server/ -v

      - name: Build extension package
        run: bash scripts/build_crx.sh dist/veil-extension.zip

      - name: Build backend release bundle
        run: python scripts/build_backend_bundle.py

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          BRANCH_SLUG="$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:]-')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="$(node -p "require('./extension/manifest.json').version")"
          TAG="fork-test-${BRANCH_SLUG}-${GITHUB_RUN_NUMBER}"
          TITLE="Fork Test ${GITHUB_REF_NAME} (${SHORT_SHA})"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body: |
            Fork test release for `${{ github.ref_name }}` at `${{ github.sha }}`.

            Install commands:

            Linux/macOS:
            `curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash -s -- --extension-id <EXTENSION_ID>`

            Windows:
            `powershell -NoProfile -ExecutionPolicy Bypass -Command "irm 'https://github.com/${{ github.repository }}/releases/latest/download/install.ps1' | iex; Install-Veil -ExtensionId '<EXTENSION_ID>'"`

            Included assets:
            - `veil-extension.zip`
            - `install.sh`
            - `install.ps1`
            - `uninstall.sh`
            - `uninstall.ps1`
            - `veil-backend-unix.tar.gz`
            - `veil-backend-windows.zip`
          files: |
            dist/veil-extension.zip
            dist/install.sh
            dist/install.ps1
            dist/uninstall.sh
            dist/uninstall.ps1
            dist/veil-backend-unix.tar.gz
            dist/veil-backend-windows.zip
          draft: false
          prerelease: false
